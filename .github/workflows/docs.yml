# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://help.github.com/actions/language-and-framework-guides/publishing-nodejs-packages
# This file was contributed by Carlos Parada and Yamel Senih from ERP Consultores y Asociados, C.A

name: Deploy Documentation on Github Pages

# Controls when the action will run.
on:
  push:
    branches:
      # Push events on master and develop branchs
      - main
      - master
      - develop
      - experimental
    # takes only the directory changes
    paths:
      - 'docs/**'
      - .github/workflows/docs.yml

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    name: Build and deploy ADempiere-Vue docs
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3

      - name: Node configuration
        uses: actions/setup-node@v3
        with:
          node-version: 14.x
          cache: 'yarn'

      - name: Verfy node version
        run: node -v

      - name: Enable https to install packages
        run: git config --global url."https://".insteadOf git://

      - name: Install Yarn
        run: npm install -g yarn@1.22.22

      - name: Verfy yarn version
        run: yarn -v

      - name: Generate static vuepress files
        run: |
          cd docs                     # Change to the 'docs' directory
          yarn ci                     # Install dependencies using Yarn
          yarn build                  # Generate static files with VuePress

      - name: Upload dist docs
        uses: actions/upload-artifact@v4  # Action to upload artifacts
        with:
          name: adempiere-vue-docs        # Name of the artifact
          path: docs/.vuepress/dist        # Path to the generated files

      - name: Init new repo in dist folder and commit generated files
        run: |
          cd docs/.vuepress/dist
          touch .nojekyll
          git init
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "docs: ${{ github.event.head_commit.message }}" -a || true

      - name: Force push to destination branch
        uses: ad-m/github-push-action@v0.6.0  # Action to push to a specific branch
        with:
          branch: gh-pages                     # Destination branch on GitHub Pages
          force: true                          # Force the push
          directory: docs/.vuepress/dist       # Directory to push
          github_token: ${{ secrets.GITHUB_TOKEN }}  # Access token for GitHub